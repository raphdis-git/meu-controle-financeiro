<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças Pro - Total Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .is-paid { opacity: 0.35; text-decoration: line-through; }
        .card-shadow { box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.04); }
        .balance-positive { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .balance-negative { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        #edit-modal-overlay, #yearly-summary-screen, #transactions-screen { 
            backdrop-filter: blur(8px); 
            background-color: rgba(248, 250, 252, 0.95);
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="max-w-3xl mx-auto pb-20">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
            <div>
                <h1 class="text-xl font-bold tracking-tight text-slate-800">💰 Finanças Cloud</h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">Gestão Pessoal 2026</p>
            </div>
            <div class="flex flex-wrap gap-2">
                <button onclick="openTransactions()" class="bg-blue-600 text-white px-3 py-2 rounded-xl shadow-sm text-[10px] font-bold uppercase hover:bg-blue-700 transition">
                    Ver Movimentações
                </button>
                <button onclick="openYearlySummary()" class="bg-slate-900 text-white px-3 py-2 rounded-xl shadow-sm text-[10px] font-bold uppercase hover:bg-black transition">
                    Resumo Anual
                </button>
                <input type="month" id="month-filter" class="bg-white px-3 py-2 rounded-xl shadow-sm border border-slate-200 outline-none text-blue-600 font-bold text-sm">
            </div>
        </header>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-8">
            <div class="bg-white p-4 rounded-2xl border border-slate-100 card-shadow text-center md:text-left">
                <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Entradas</p>
                <h2 id="total-income" class="text-base font-bold text-emerald-600">R$ 0,00</h2>
            </div>
            <div class="bg-white p-4 rounded-2xl border border-slate-100 card-shadow text-center md:text-left">
                <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Saídas</p>
                <h2 id="total-expense" class="text-base font-bold text-rose-500">R$ 0,00</h2>
            </div>
            <div id="balance-card" class="p-4 rounded-2xl card-shadow transition-colors duration-500 text-center md:text-left">
                <p class="text-[9px] font-bold opacity-70 uppercase mb-1">Saldo Livre</p>
                <h2 id="monthly-net-balance" class="text-base font-bold">R$ 0,00</h2>
            </div>
            <div class="bg-amber-50 p-4 rounded-2xl border border-amber-100 card-shadow text-center md:text-left">
                <p class="text-[9px] font-bold text-amber-600 uppercase mb-1">Pendente</p>
                <h2 id="to-pay-balance" class="text-base font-bold text-amber-700">R$ 0,00</h2>
            </div>
        </div>

        <div class="bg-white p-5 rounded-3xl border border-slate-200 card-shadow mb-8">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Quitar por Categoria (Mês Atual)</h3>
            <div id="category-summary" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
        </div>

        <div class="bg-white p-6 rounded-3xl border border-slate-200 card-shadow mb-8">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Novo Lançamento</h3>
            <form id="finance-form" class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Categoria</label>
                    <div class="flex gap-2">
                        <select id="category" class="flex-1 p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none font-bold text-blue-700 text-sm" required></select>
                        <button type="button" onclick="toggleNewCategory()" class="bg-blue-600 text-white w-12 rounded-xl font-bold text-xl hover:bg-blue-700 transition">+</button>
                        <button type="button" onclick="toggleManager()" class="bg-slate-100 text-slate-500 w-12 rounded-xl font-bold hover:bg-slate-200 transition">⚙️</button>
                    </div>
                </div>

                <div id="add-cat-panel" class="hidden p-4 bg-blue-50 rounded-2xl border border-blue-100 space-y-3">
                    <input type="text" id="custom-cat-name" placeholder="Nome da Categoria" class="p-2 text-sm border-white rounded-lg outline-none w-full">
                    <button type="button" onclick="saveNewCategory()" class="w-full bg-blue-600 text-white py-2 rounded-lg text-[10px] font-bold uppercase">Cadastrar</button>
                </div>

                <div id="manager-panel" class="hidden p-4 bg-slate-100 rounded-2xl border border-slate-200 space-y-2 text-center">
                    <div id="my-categories-list" class="flex flex-wrap gap-2 justify-center"></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Título</label>
                        <input type="text" id="title" placeholder="Ex: Internet" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm" required>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Valor</label>
                        <input type="text" id="amount" placeholder="R$ 0,00" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none font-bold text-blue-600 text-sm" required>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Descrição</label>
                    <input type="text" id="description" placeholder="Opcional" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <select id="type" class="p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-xs font-bold" required>
                        <option value="saida">🔴 Gasto</option>
                        <option value="entrada">🟢 Recebimento</option>
                    </select>
                    <select id="recurrence" onchange="toggleInstallments()" class="p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-xs font-bold" required>
                        <option value="unico">Uma vez</option>
                        <option value="fixo">Mensal Fixo (12 meses)</option>
                        <option value="parcelado">Parcelado</option>
                    </select>
                    <div id="installments-box" class="hidden">
                        <input type="number" id="installments-count" min="2" placeholder="Qtde Parcelas" class="w-full p-3 bg-blue-50 border border-blue-200 rounded-xl outline-none text-xs font-bold">
                    </div>
                </div>

                <button type="submit" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold shadow-lg hover:bg-black transition">Salvar Lançamento</button>
            </form>
        </div>
    </div>

    <div id="transactions-screen" class="hidden fixed inset-0 z-[60] overflow-y-auto p-4 md:p-8">
        <div class="max-w-4xl mx-auto">
            <header class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-xl font-black text-slate-800 uppercase">Movimentações</h2>
                    <p id="transaction-month-label" class="text-[10px] font-bold text-blue-600 uppercase"></p>
                </div>
                <button onclick="closeTransactions()" class="bg-white border border-slate-200 px-4 py-2 rounded-2xl font-bold text-xs hover:bg-slate-50 transition">✕ FECHAR</button>
            </header>

            <div class="bg-white rounded-3xl border border-slate-200 card-shadow overflow-hidden">
                <div class="p-4 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                    <div id="bulk-actions" class="hidden flex gap-2 items-center">
                        <span id="selected-count" class="text-[9px] font-bold text-amber-600 uppercase">0 selecionados</span>
                        <button onclick="bulkDuplicate()" class="bg-amber-500 text-white px-3 py-1.5 rounded-lg text-[9px] font-bold uppercase hover:bg-amber-600 transition">Duplicar em Lote</button>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b border-slate-100">
                            <tr>
                                <th class="p-4 w-10">
                                    <input type="checkbox" id="select-all" onclick="toggleSelectAll()" class="w-4 h-4 rounded border-slate-300">
                                </th>
                                <th class="p-4 text-[9px] font-bold text-slate-400 uppercase">Status</th>
                                <th class="py-4 px-2 text-[9px] font-bold text-slate-400 uppercase">Descrição</th>
                                <th class="p-4 text-right text-[9px] font-bold text-slate-400 uppercase">Valor</th>
                                <th class="p-4 text-right text-[9px] font-bold text-slate-400 uppercase">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="transaction-list" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
                <div id="loading" class="p-10 text-center text-slate-300 font-bold text-[10px] uppercase">Sincronizando...</div>
            </div>
        </div>
    </div>

    <div id="yearly-summary-screen" class="hidden fixed inset-0 z-[60] overflow-y-auto p-4 md:p-8">
        <div class="max-w-3xl mx-auto">
            <header class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">Resumo <span id="display-year"></span></h2>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Performance Financeira Anual</p>
                </div>
                <button onclick="closeYearlySummary()" class="bg-white border border-slate-200 px-6 py-2 rounded-2xl font-bold text-xs shadow-sm hover:bg-slate-50 transition">✕ VOLTAR</button>
            </header>
            <div id="yearly-cards" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <div id="edit-modal-overlay" class="hidden fixed inset-0 z-[70] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 shadow-2xl space-y-5">
            <h3 class="text-lg font-bold">Editar Transação</h3>
            <div class="space-y-4">
                <input type="text" id="edit-title" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm">
                <input type="text" id="edit-description" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm">
                <input type="text" id="edit-amount" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none font-bold text-blue-600 text-sm">
            </div>
            <div class="flex flex-col gap-2">
                <button onclick="confirmEdit(true)" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold text-xs uppercase">Salvar em TODOS os futuros</button>
                <button onclick="confirmEdit(false)" class="w-full bg-slate-100 text-slate-700 p-3 rounded-xl font-bold text-xs uppercase">Apenas este mês</button>
                <button onclick="closeEditModal()" class="w-full text-slate-400 text-xs font-bold uppercase mt-2">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://cxitsxuqxclucwdlwynp.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_bu8qGEMLijUsVzwQk0Of4w_30CJ2j-U';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let transactions = [];
        let categorySettings = JSON.parse(localStorage.getItem('cat_settings')) || {};
        let currentEditId = null;

        const monthFilter = document.getElementById('month-filter');
        monthFilter.value = new Date().toISOString().substring(0, 7);

        // --- NAVEGAÇÃO ---
        function openTransactions() { 
            const [year, month] = monthFilter.value.split('-');
            const months = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
            document.getElementById('transaction-month-label').innerText = `${months[parseInt(month)-1]} ${year}`;
            document.getElementById('transactions-screen').classList.remove('hidden'); 
        }
        function closeTransactions() { document.getElementById('transactions-screen').classList.add('hidden'); }

        function openYearlySummary() {
            const year = monthFilter.value.split('-')[0];
            document.getElementById('display-year').innerText = year;
            const container = document.getElementById('yearly-cards');
            const months = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
            
            let html = '';
            for (let m = 1; m <= 12; m++) {
                const mStr = `${year}-${m.toString().padStart(2, '0')}`;
                let inc = 0, exp = 0;
                
                transactions.forEach(t => { 
                    if (t.date.startsWith(mStr)) { 
                        if (t.type === 'entrada') inc += t.amount; else exp += t.amount; 
                    } 
                });

                const balance = inc - exp;
                const percentUsed = inc > 0 ? Math.min((exp / inc) * 100, 100) : (exp > 0 ? 100 : 0);
                const barColor = percentUsed > 90 ? 'bg-rose-500' : (percentUsed > 70 ? 'bg-amber-500' : 'bg-emerald-500');

                html += `
                <div class="bg-white p-5 rounded-3xl border border-slate-200 card-shadow space-y-3">
                    <div class="flex items-center justify-between">
                        <p class="text-[10px] font-black uppercase text-slate-400 tracking-tighter">${months[m-1]}</p>
                        <p class="font-black text-sm ${balance >= 0 ? 'text-emerald-600' : 'text-rose-600'}">
                            ${balance.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}
                        </p>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <p class="text-[9px] text-slate-400 uppercase font-bold">Ganhos</p>
                            <p class="text-xs font-bold text-slate-700">R$ ${inc.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] text-slate-400 uppercase font-bold">Gastos</p>
                            <p class="text-xs font-bold text-slate-700">R$ ${exp.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                        </div>
                    </div>
                    <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                        <div class="${barColor} h-full transition-all duration-1000" style="width: ${percentUsed}%"></div>
                    </div>
                </div>`;
            }
            container.innerHTML = html;
            document.getElementById('yearly-summary-screen').classList.remove('hidden');
        }
        function closeYearlySummary() { document.getElementById('yearly-summary-screen').classList.add('hidden'); }

        // --- LÓGICA CORE ---
        function toggleNewCategory() { document.getElementById('add-cat-panel').classList.toggle('hidden'); }
        function toggleManager() { document.getElementById('manager-panel').classList.toggle('hidden'); if(!document.getElementById('manager-panel').classList.contains('hidden')) renderManager(); }
        function toggleInstallments() { document.getElementById('installments-box').classList.toggle('hidden', document.getElementById('recurrence').value !== 'parcelado'); }

        function setupCurrencyInput(id) {
            document.getElementById(id).addEventListener('input', (e) => {
                let value = e.target.value.replace(/\D/g, "");
                value = (value / 100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                e.target.value = value === 'R$ 0,00' ? '' : value;
            });
        }
        setupCurrencyInput('amount');
        setupCurrencyInput('edit-amount');

        async function loadData() {
            const { data, error } = await _supabase.from('transacoes').select('*').order('date', { ascending: true });
            if (!error) { transactions = data; updateCategoryDropdown(); render(); }
            document.getElementById('loading').classList.add('hidden');
        }

        function updateCategoryDropdown(selected = null) {
            const select = document.getElementById('category');
            let allCats = [...new Set([...transactions.map(t => t.category), ...Object.keys(categorySettings)])].filter(c => c).sort();
            select.innerHTML = '<option value="" disabled selected>Categoria...</option>';
            allCats.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat; opt.text = cat;
                select.add(opt);
            });
            if(selected) select.value = selected;
        }

        async function saveData(e) {
            e.preventDefault();
            const cat = document.getElementById('category').value;
            const amount = parseFloat(document.getElementById('amount').value.replace(/[^\d,]/g, "").replace(",", ".")) || 0;
            const [year, month] = monthFilter.value.split('-');
            const recType = document.getElementById('recurrence').value;
            let numRep = (recType === 'fixo') ? 12 : (recType === 'parcelado' ? (parseInt(document.getElementById('installments-count').value) || 2) : 1);
            
            let payloads = [];
            for (let i = 0; i < numRep; i++) {
                let d = new Date(year, parseInt(month)-1 + i, 1, 12, 0, 0);
                let title = document.getElementById('title').value;
                if(recType === 'parcelado') title += ` (${(i+1).toString().padStart(2,'0')}/${numRep})`;

                payloads.push({ 
                    title, amount, category: cat, 
                    description: document.getElementById('description').value, 
                    type: document.getElementById('type').value, 
                    date: d.toISOString().split('T')[0], 
                    mes_referencia: d.getMonth() + 1,
                    ano_referencia: d.getFullYear(),
                    paid: false 
                });
            }
            await _supabase.from('transacoes').insert(payloads);
            document.getElementById('finance-form').reset();
            loadData();
        }

        // --- RENDERIZAÇÃO E UI ---
        function render() {
            const list = document.getElementById('transaction-list');
            const summaryBox = document.getElementById('category-summary');
            list.innerHTML = ''; summaryBox.innerHTML = '';
            let inc = 0, exp = 0, toPay = 0, catStats = {};

            transactions.forEach(t => {
                if (t.date.startsWith(monthFilter.value)) {
                    const isInc = t.type === 'entrada';
                    if (isInc) inc += t.amount; 
                    else { 
                        exp += t.amount; 
                        if(!t.paid) { toPay += t.amount; catStats[t.category] = (catStats[t.category] || 0) + t.amount; }
                    }

                    const tr = document.createElement('tr');
                    tr.className = `hover:bg-slate-50 transition-colors ${t.paid ? 'is-paid' : ''}`;
                    tr.innerHTML = `
                        <td class="p-4 w-10"><input type="checkbox" class="transaction-checkbox w-4 h-4 rounded border-slate-300" value="${t.id}" onchange="updateBulkUI()"></td>
                        <td class="p-4 w-10"><button onclick="togglePaid(${t.id}, ${t.paid})" class="w-6 h-6 rounded-full border-2 flex items-center justify-center ${t.paid ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-200'}">${t.paid ? '✓' : ''}</button></td>
                        <td class="py-4 px-2">
                            <div class="text-sm font-semibold text-slate-700">${t.title}</div>
                            <div class="text-[9px] text-slate-400 font-bold uppercase">${t.category}</div>
                        </td>
                        <td class="p-4 text-right font-bold text-sm ${isInc ? 'text-emerald-500' : 'text-slate-600'}">R$ ${t.amount.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                        <td class="p-4 text-right flex gap-2 justify-end">
                            <button onclick="duplicateToMonths(${t.id})" title="Duplicar" class="text-slate-300 hover:text-amber-500 transition">📑</button>
                            <button onclick="openEditModal(${t.id})" class="text-slate-300 hover:text-blue-500 transition">📝</button>
                            <button onclick="deleteItem(${t.id})" class="text-slate-300 hover:text-rose-500 transition">🗑️</button>
                        </td>
                    `;
                    list.appendChild(tr);
                }
            });

            Object.keys(catStats).forEach(cat => {
                const card = document.createElement('div');
                card.className = "flex items-center justify-between p-3 bg-slate-50 border border-slate-100 rounded-2xl";
                card.innerHTML = `<div><p class="text-[10px] font-bold text-slate-400 uppercase">${cat}</p><p class="text-xs font-bold text-rose-500">R$ ${catStats[cat].toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p></div><button onclick="payCategory('${cat}')" class="bg-emerald-100 text-emerald-600 text-[10px] font-black px-3 py-2 rounded-xl uppercase">Quitar</button>`;
                summaryBox.appendChild(card);
            });

            const net = inc - exp;
            document.getElementById('balance-card').className = `p-4 rounded-2xl card-shadow ${net >= 0 ? 'balance-positive' : 'balance-negative'}`;
            document.getElementById('total-income').innerText = `R$ ${inc.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('total-expense').innerText = `R$ ${exp.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('monthly-net-balance').innerText = `R$ ${net.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('to-pay-balance').innerText = `R$ ${toPay.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
        }

        // --- AÇÕES ---
        async function togglePaid(id, status) { await _supabase.from('transacoes').update({ paid: !status }).eq('id', id); loadData(); }
        async function deleteItem(id) { if (confirm(`Excluir este lançamento?`)) { await _supabase.from('transacoes').delete().eq('id', id); loadData(); } }
        
        function openEditModal(id) {
            currentEditId = id;
            const t = transactions.find(x => x.id === id);
            document.getElementById('edit-title').value = t.title;
            document.getElementById('edit-description').value = t.description || '';
            document.getElementById('edit-amount').value = t.amount.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('edit-modal-overlay').classList.remove('hidden');
        }
        function closeEditModal() { document.getElementById('edit-modal-overlay').classList.add('hidden'); }

        async function confirmEdit(prop) {
            const t = transactions.find(x => x.id === currentEditId);
            const val = parseFloat(document.getElementById('edit-amount').value.replace(/[^\d,]/g, "").replace(",", ".")) || 0;
            const title = document.getElementById('edit-title').value;
            const desc = document.getElementById('edit-description').value;
            
            if(prop) {
                const base = t.title.split(' (')[0];
                await _supabase.from('transacoes').update({ title, amount: val, description: desc }).match({ category: t.category }).filter('title', 'ilike', `%${base}%`).gte('date', t.date);
            } else {
                await _supabase.from('transacoes').update({ title, amount: val, description: desc }).eq('id', currentEditId);
            }
            closeEditModal(); loadData();
        }

        async function payCategory(cat) {
            const ids = transactions.filter(t => t.category === cat && t.date.startsWith(monthFilter.value) && !t.paid && t.type === 'saida').map(t => t.id);
            if (ids.length > 0 && confirm(`Quitar tudo de "${cat}" neste mês?`)) { await _supabase.from('transacoes').update({ paid: true }).in('id', ids); loadData(); }
        }

        async function duplicateToMonths(id) {
            const t = transactions.find(x => x.id === id);
            const qtd = prompt(`Duplicar "${t.title}" para quantos meses futuros?`, "1");
            const num = parseInt(qtd);
            if (isNaN(num) || num <= 0) return;
            let payloads = [];
            const baseDate = new Date(t.date + 'T12:00:00');
            for (let i = 1; i <= num; i++) {
                let d = new Date(baseDate.getFullYear(), baseDate.getMonth() + i, baseDate.getDate(), 12, 0, 0);
                payloads.push({
                    title: t.title, amount: t.amount, category: t.category, description: t.description, type: t.type,
                    date: d.toISOString().split('T')[0], mes_referencia: d.getMonth() + 1, ano_referencia: d.getFullYear(), paid: false
                });
            }
            await _supabase.from('transacoes').insert(payloads);
            loadData();
        }

        function updateBulkUI() {
            const selected = document.querySelectorAll('.transaction-checkbox:checked');
            const bulkBar = document.getElementById('bulk-actions');
            if (selected.length > 0) {
                bulkBar.classList.remove('hidden');
                document.getElementById('selected-count').innerText = `${selected.length} selecionado(s)`;
            } else {
                bulkBar.classList.add('hidden');
            }
        }

        function toggleSelectAll() {
            const isChecked = document.getElementById('select-all').checked;
            document.querySelectorAll('.transaction-checkbox').forEach(cb => cb.checked = isChecked);
            updateBulkUI();
        }

        document.getElementById('finance-form').onsubmit = saveData;
        monthFilter.onchange = loadData;
        loadData();
    </script>
</body>
</html>
